  <style>
    /* =========================================================
       DOWNLOADS.HTML — Page-specific styles
       ========================================================= */

    /* ---- Page Header ---- */
    .dl-page-header {
      padding: calc(var(--space-32) + var(--space-8)) var(--space-6) var(--space-16);
      background: var(--color-bg);
      text-align: center;
    }

    .dl-page-header__inner {
      max-width: var(--content-default);
      margin: 0 auto;
    }

    .dl-page-header__label {
      font-size: var(--text-xs);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--color-accent);
      font-weight: 500;
      margin-bottom: var(--space-4);
    }

    .dl-page-header__title {
      font-family: var(--font-display);
      font-size: clamp(2rem, 1rem + 4vw, 4rem);
      font-weight: 800;
      color: #ffffff;
      letter-spacing: -0.03em;
      line-height: 1.05;
      margin-bottom: var(--space-5);
    }

    .dl-page-header__desc {
      font-size: var(--text-base);
      color: var(--color-text-muted);
      line-height: 1.7;
      max-width: 580px;
      margin: 0 auto;
    }

    /* ---- Section Wrapper ---- */
    .dl-section {
      padding: clamp(var(--space-16), 7vw, var(--space-24)) var(--space-6);
    }

    .dl-section--alt {
      background: var(--color-surface);
    }

    .dl-section__head {
      max-width: var(--content-wide);
      margin: 0 auto var(--space-12);
    }

    .dl-section__label {
      font-size: var(--text-xs);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--color-accent);
      font-weight: 500;
      margin-bottom: var(--space-4);
    }

    .dl-section__title {
      font-family: var(--font-display);
      font-size: var(--text-2xl);
      font-weight: 800;
      color: #ffffff;
      letter-spacing: -0.03em;
      margin-bottom: var(--space-4);
    }

    .dl-section__subtitle {
      font-size: var(--text-base);
      color: var(--color-text-muted);
      line-height: 1.7;
      max-width: 560px;
    }

    /* ---- Download Card Grid ---- */
    .dl-grid {
      max-width: var(--content-wide);
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: var(--space-6);
    }

    /* ---- Download Card (free) ---- */
    .dl-card {
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: border-color var(--transition-interactive), transform var(--transition-interactive);
    }

    .dl-card:hover {
      border-color: var(--color-accent);
      transform: translateY(-3px);
    }

    /* Poster preview image */
    .dl-card__preview {
      width: 100%;
      aspect-ratio: 3 / 4;
      object-fit: cover;
      display: block;
      filter: brightness(0.92);
      transition: filter var(--transition-smooth);
    }

    .dl-card:hover .dl-card__preview {
      filter: brightness(1);
    }

    /* Card body */
    .dl-card__body {
      padding: var(--space-6);
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
      flex: 1;
    }

    .dl-card__tag {
      font-size: var(--text-xs);
      font-weight: 700;
      color: var(--color-accent);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .dl-card__title {
      font-family: var(--font-display);
      font-size: var(--text-lg);
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.02em;
      line-height: 1.25;
    }

    .dl-card__text {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      line-height: 1.65;
      flex: 1;
    }

    .dl-card__btn {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-3) var(--space-6);
      border-radius: var(--radius-full);
      font-family: var(--font-body);
      font-size: var(--text-sm);
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      letter-spacing: 0.02em;
      justify-content: center;
      /* Amber outline (free) */
      background: transparent;
      color: var(--color-accent);
      border: 1.5px solid var(--color-accent);
      transition: background var(--transition-interactive), color var(--transition-interactive);
    }

    .dl-card__btn:hover {
      background: var(--color-accent);
      color: #0d0d0d;
    }

    /* ---- Paid Card variations ---- */
    .dl-card--paid {
      background: var(--color-surface-2);
    }

    .dl-card--featured {
      border-color: var(--color-accent);
      background: linear-gradient(165deg, var(--color-surface-2) 0%, rgba(232, 168, 56, 0.06) 100%);
      box-shadow: 0 0 40px rgba(232, 168, 56, 0.08);
      position: relative;
    }

    .dl-card--featured:hover {
      border-color: var(--color-accent-hover);
    }

    .dl-card__badge {
      position: absolute;
      top: calc(-1 * var(--space-3));
      left: 50%;
      transform: translateX(-50%);
      background: var(--color-accent);
      color: #0d0d0d;
      font-size: var(--text-xs);
      font-weight: 700;
      padding: var(--space-1) var(--space-5);
      border-radius: var(--radius-full);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .dl-card__btn--buy {
      background: var(--color-accent);
      color: #0d0d0d;
      border: none;
    }

    .dl-card__btn--buy:hover {
      background: var(--color-accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(232, 168, 56, 0.3);
    }

    /* ---- TRENNER (Divider between sections) ---- */
    .dl-trenner {
      width: 100%;
      background: #0d0d0d;
      border-top: 2px solid var(--color-accent);
      padding: var(--space-16) var(--space-6);
      text-align: center;
    }

    .dl-trenner__inner {
      max-width: var(--content-default);
      margin: 0 auto;
    }

    .dl-trenner__label {
      font-size: var(--text-xs);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--color-accent);
      font-weight: 500;
      margin-bottom: var(--space-4);
    }

    .dl-trenner__title {
      font-family: var(--font-display);
      font-size: clamp(1.4rem, 1rem + 2vw, 2.2rem);
      font-weight: 800;
      color: #ffffff;
      letter-spacing: -0.03em;
      line-height: 1.2;
      margin-bottom: var(--space-3);
    }

    .dl-trenner__text {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      max-width: 500px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* ---- Bundle Box ---- */
    .dl-bundle {
      max-width: var(--content-wide);
      margin: var(--space-10) auto 0;
      background: linear-gradient(135deg, var(--color-surface-2) 0%, rgba(232, 168, 56, 0.05) 100%);
      border: 2px solid var(--color-accent);
      border-radius: var(--radius-xl);
      padding: var(--space-10) var(--space-8);
    }

    .dl-bundle__inner {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-8);
      align-items: center;
    }

    @media (min-width: 768px) {
      .dl-bundle__inner {
        grid-template-columns: 1fr auto;
        gap: var(--space-12);
      }
    }

    .dl-bundle__label {
      font-size: var(--text-xs);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--color-accent);
      font-weight: 700;
      margin-bottom: var(--space-3);
    }

    .dl-bundle__title {
      font-family: var(--font-display);
      font-size: clamp(1.4rem, 1rem + 2vw, 2rem);
      font-weight: 800;
      color: #ffffff;
      letter-spacing: -0.03em;
      line-height: 1.2;
      margin-bottom: var(--space-4);
    }

    .dl-bundle__desc {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      line-height: 1.7;
      max-width: 520px;
      margin-bottom: var(--space-5);
    }

    .dl-bundle__list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      margin-bottom: var(--space-6);
    }

    .dl-bundle__list li {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      padding-left: var(--space-6);
      position: relative;
      line-height: 1.5;
    }

    .dl-bundle__list li::before {
      content: '✓';
      position: absolute;
      left: 0;
      color: var(--color-accent);
      font-weight: 700;
    }

    .dl-bundle__cta {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: var(--space-4);
    }

    @media (min-width: 768px) {
      .dl-bundle__cta {
        align-items: flex-end;
        text-align: right;
        flex-shrink: 0;
      }
    }

    .dl-bundle__price {
      font-family: var(--font-display);
      font-size: clamp(2.2rem, 1rem + 4vw, 3.5rem);
      font-weight: 800;
      color: var(--color-accent);
      letter-spacing: -0.04em;
      line-height: 1;
    }

    .dl-bundle__btn {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-4) var(--space-8);
      border-radius: var(--radius-full);
      font-family: var(--font-body);
      font-size: var(--text-base);
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      letter-spacing: 0.02em;
      background: var(--color-accent);
      color: #0d0d0d;
      border: none;
      transition: background var(--transition-interactive), transform var(--transition-interactive), box-shadow var(--transition-interactive);
      white-space: nowrap;
    }

    .dl-bundle__btn:hover {
      background: var(--color-accent-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(232, 168, 56, 0.35);
    }

    .dl-bundle__hint {
      font-size: var(--text-xs);
      color: var(--color-text-faint);
      line-height: 1.5;
    }

    /* Responsive nav adjustments */
    @media (min-width: 1024px) {
      .nav__links { gap: var(--space-6); }
    }

    @media (min-width: 768px) and (max-width: 1023px) {
      .nav__links { gap: var(--space-4); }
    }

    /* ---- Footer (same as index) ---- */
    .footer-new {
      background: var(--color-bg);
      border-top: 1px solid var(--color-border);
      padding: var(--space-10) var(--space-6) var(--space-8);
    }

    .footer-new__inner {
      max-width: var(--content-wide);
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-6);
      text-align: center;
    }

    .footer-new__brand {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      text-decoration: none;
    }

    .footer-new__brand-logo {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
    }

    .footer-new__brand-name {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1.3rem;
      color: var(--color-accent);
      letter-spacing: -0.02em;
    }

    .footer-new__tagline {
      font-size: var(--text-sm);
      color: var(--color-text-faint);
      max-width: 520px;
      line-height: 1.6;
    }

    .footer-new__links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: var(--space-2) var(--space-6);
    }

    .footer-new__links a {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      text-decoration: none;
    }

    .footer-new__links a:hover {
      color: var(--color-text);
    }

    .footer-new__bottom {
      font-size: var(--text-xs);
      color: var(--color-text-faint);
    }

    .footer-new__bottom a {
      color: var(--color-text-faint);
      text-decoration: none;
    }

    .footer-new__bottom a:hover {
      color: var(--color-accent);
    }
  </style>
</head>
